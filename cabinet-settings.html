<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Баптаулар | Жеке кабинет</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-robot me-2"></i>AI Университет
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link btn btn-outline-light btn-sm" href="cabinet-login.html">
                    <i class="bi bi-box-arrow-right me-1"></i>Шығу
                </a>
            </div>
        </div>
    </nav>

    <div class="cabinet-layout">
        <aside class="cabinet-sidebar">
            <div class="sidebar-profile p-4 text-center border-bottom">
                <div class="user-avatar mx-auto mb-2">
                    <i class="bi bi-person-fill"></i>
                </div>
                <h6 class="fw-bold mb-0">Студент Аты</h6>
                <small class="text-muted">3 курс · Ақпараттық жүйелер</small>
            </div>
            <nav class="sidebar-nav p-3">
                <a href="cabinet-dashboard.html" class="nav-item">
                    <i class="bi bi-grid-1x2"></i>
                    <span>Басты панель</span>
                </a>
                <a href="cabinet-documents.html" class="nav-item">
                    <i class="bi bi-journal-text"></i>
                    <span>Құжаттар</span>
                </a>
                <a href="cabinet-schedule.html" class="nav-item">
                    <i class="bi bi-calendar3"></i>
                    <span>Кесте</span>
                </a>
                <a href="cabinet-assistant.html" class="nav-item">
                    <i class="bi bi-chat-dots"></i>
                    <span>AI Көмекші</span>
                </a>
                <a href="cabinet-grades.html" class="nav-item">
                    <i class="bi bi-award"></i>
                    <span>Бағалар</span>
                </a>
                <a href="cabinet-notifications.html" class="nav-item">
                    <i class="bi bi-bell"></i>
                    <span>Хабарламалар</span>
                </a>
                <a href="cabinet-profile.html" class="nav-item">
                    <i class="bi bi-person"></i>
                    <span>Профиль</span>
                </a>
                <a href="cabinet-settings.html" class="nav-item active">
                    <i class="bi bi-gear"></i>
                    <span>Баптаулар</span>
                </a>
            </nav>
        </aside>

        <main class="cabinet-content">
            <div class="content-header py-4">
                <h1 class="h4 fw-bold mb-1">Баптаулар</h1>
                <p class="text-muted small mb-0">Жеке деректер мен параметрлер</p>
            </div>

            <div class="row">
                <div class="col-lg-8">
                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-header bg-white border-bottom py-3">
                            <h5 class="mb-0 fw-semibold">Жеке деректер</h5>
                        </div>
                        <div class="card-body">
                            <form>
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label">Аты-жөні</label>
                                        <input type="text" class="form-control" value="Студент Аты">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Электрондық пошта</label>
                                        <input type="email" class="form-control" value="student@university.kz">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Телефон</label>
                                        <input type="tel" class="form-control" placeholder="+7 (XXX) XXX-XX-XX">
                                    </div>
                                    <div class="col-12">
                                        <button type="submit" class="btn btn-primary">Сақтау</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>

                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white border-bottom py-3">
                            <h5 class="mb-0 fw-semibold">Құпия сөзді өзгерту</h5>
                        </div>
                        <div class="card-body">
                            <form>
                                <div class="mb-3">
                                    <label class="form-label">Ағымдағы құпия сөз</label>
                                    <input type="password" class="form-control" placeholder="••••••••">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Жаңа құпия сөз</label>
                                    <input type="password" class="form-control" placeholder="••••••••">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Жаңа құпия сөзді қайталаңыз</label>
                                    <input type="password" class="form-control" placeholder="••••••••">
                                </div>
                                <button type="submit" class="btn btn-primary">Құпия сөзді өзгерту</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
