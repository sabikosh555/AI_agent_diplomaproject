{% load static %}
<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тіркелу | AI Университет</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{% static 'css/styles.css' %}" rel="stylesheet">
</head>
<body class="login-page">
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'main:index' %}">
                <i class="bi bi-robot me-2"></i>AI Университет
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'main:index' %}">Басты бет</a>
                <a class="nav-link" href="{% url 'cabinet:login' %}">Кіру</a>
            </div>
        </div>
    </nav>

    <main class="login-main">
        <div class="container">
            <div class="row justify-content-center align-items-center min-vh-75">
                <div class="col-md-6 col-lg-5">
                    <div class="login-card card border-0 shadow">
                        <div class="card-body p-5">
                            <div class="text-center mb-4">
                                <div class="login-avatar mx-auto mb-3">
                                    <i class="bi bi-person-plus-fill"></i>
                                </div>
                                <h2 class="h4 fw-bold text-dark mb-2">Тіркелу</h2>
                                <p class="text-muted small">Жеке кабинет үшін тіркеліңіз</p>
                            </div>
                            {% if messages %}
                            {% for message in messages %}
                            <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %}">{{ message }}</div>
                            {% endfor %}
                            {% endif %}
                            <form method="post" action="{% url 'cabinet:register' %}">
                                {% csrf_token %}
                                <div class="mb-3">
                                    <label class="form-label fw-medium">Пайдаланушы аты *</label>
                                    <input type="text" name="username" class="form-control" placeholder="student" required autofocus value="{{ request.POST.username }}">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-medium">Электрондық пошта *</label>
                                    <input type="email" name="email" class="form-control" placeholder="email@university.kz" required value="{{ request.POST.email }}">
                                </div>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label fw-medium">Аты</label>
                                        <input type="text" name="first_name" class="form-control" placeholder="Аты" value="{{ request.POST.first_name }}">
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label fw-medium">Тегі</label>
                                        <input type="text" name="last_name" class="form-control" placeholder="Тегі" value="{{ request.POST.last_name }}">
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-medium">Құпия сөз *</label>
                                    <input type="password" name="password1" class="form-control" placeholder="Кем дегенде 6 таңба" required minlength="6">
                                </div>
                                <div class="mb-4">
                                    <label class="form-label fw-medium">Құпия сөзді қайталаңыз *</label>
                                    <input type="password" name="password2" class="form-control" placeholder="Құпия сөзді қайта енгізіңіз" required>
                                </div>
                                <button type="submit" class="btn btn-primary btn-lg w-100 mb-3 py-2">
                                    <i class="bi bi-person-plus me-2"></i>Тіркелу
                                </button>
                                <p class="text-center text-muted small mb-0">
                                    Тіркелгенсіз бе? <a href="{% url 'cabinet:login' %}">Кіру</a>
                                </p>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
