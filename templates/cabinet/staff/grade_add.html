{% extends 'cabinet/staff/base_staff.html' %}
{% block title %}Баға қосу{% endblock %}

{% block content %}
<div class="content-header py-4">
    <h1 class="h4 fw-bold mb-1">Баға қосу</h1>
    <p class="text-muted small mb-0">Студентке жаңа баға енгізу</p>
</div>

<div class="card border-0 shadow-sm" style="max-width: 500px;">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Студент</label>
                <select name="user_id" class="form-select" required>
                    <option value="">Таңдаңыз...</option>
                    {% for s in students %}
                    <option value="{{ s.id }}">{{ s.get_full_name|default:s.username }} ({{ s.email }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Пән</label>
                <input type="text" name="subject" class="form-control" required placeholder="Мысалы: Математика">
            </div>
            <div class="mb-3">
                <label class="form-label">Баға</label>
                <input type="number" name="score" class="form-control" min="0" max="100" placeholder="0-100">
            </div>
            <button type="submit" class="btn btn-primary">Қосу</button>
            <a href="{% url 'cabinet:staff_grades' %}" class="btn btn-secondary">Болдырмау</a>
        </form>
    </div>
</div>
{% endblock %}
