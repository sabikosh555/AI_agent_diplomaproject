{% load static %}
<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Жеке кабинетке кіру | AI Университет</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{% static 'css/styles.css' %}" rel="stylesheet">
</head>
<body class="login-page">
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'main:index' %}">
                <i class="bi bi-robot me-2"></i>AI Университет
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'main:index' %}">Басты бет</a>
                <a class="nav-link" href="{% url 'main:index' %}#көмекші">AI Көмекші</a>
            </div>
        </div>
    </nav>

    <main class="login-main">
        <div class="container">
            <div class="row justify-content-center align-items-center min-vh-75">
                <div class="col-md-6 col-lg-5">
                    <div class="login-card card border-0 shadow">
                        <div class="card-body p-5">
                            <div class="text-center mb-4">
                                <div class="login-avatar mx-auto mb-3">
                                    <i class="bi bi-person-fill"></i>
                                </div>
                                <h2 class="h4 fw-bold text-dark mb-2">Жеке кабинетке кіру</h2>
                                <p class="text-muted small">Пайдаланушы аты мен құпия сөзді енгізіңіз</p>
                            </div>
                            {% if messages %}
                            {% for message in messages %}
                            <div class="alert alert-danger">{{ message }}</div>
                            {% endfor %}
                            {% endif %}
                            <form method="post" action="{% url 'cabinet:login' %}">
                                {% csrf_token %}
                                <input type="hidden" name="next" value="{{ request.GET.next }}">
                                <div class="mb-3">
                                    <label class="form-label fw-medium">Пайдаланушы аты</label>
                                    <input type="text" name="username" class="form-control form-control-lg" placeholder="student" required autofocus>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label fw-medium">Құпия сөз</label>
                                    <input type="password" name="password" class="form-control form-control-lg" placeholder="••••••••" required>
                                </div>
                                <div class="mb-4 form-check">
                                    <input type="checkbox" class="form-check-input" id="remember" name="remember">
                                    <label class="form-check-label small" for="remember">Мені есте сақта</label>
                                </div>
                                <button type="submit" class="btn btn-primary btn-lg w-100 mb-3 py-2">
                                    <i class="bi bi-box-arrow-in-right me-2"></i>Кіру
                                </button>
                                <p class="text-center text-muted small mb-0">
                                    Тіркелмегенсіз бе? <a href="{% url 'cabinet:register' %}">Тіркелу</a>
                                </p>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
